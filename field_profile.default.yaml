# 左边是脚本内部使用的标准字段名；右边是输入 TSV 里允许出现的列名。
# 如果标准字段已经存在，会优先使用标准字段；否则按右侧候选列名从前到后查找。
columns:
  品牌:
    - 品牌
  前台车型:
    - 前台车型
    - 车型名
  结构:
    - 结构
  版本:
    - 版本
  年份区间:
    - 年份区间
  最终尺码:
    - 最终尺码
    - 对应尺码
  驾驶室类型:
    - 驾驶室类型
  货斗长度_ft:
    - 货斗长度_ft
  子车系:
    - 子车系
  开始年:
    - 开始年
  分类:
    - 分类

derived:
  主车型:
    join:
      - 品牌
      - 前台车型
    sep: " "

defaults:
  # 分类为空时，脚本会退回用 驾驶室类型 / 货斗长度_ft 判断是否皮卡。
  分类: ""
